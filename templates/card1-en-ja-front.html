<main class="study-card study-card--front">
  <div class="corner corner--top" aria-hidden="true"></div>
  <div class="corner-dots corner-dots--top" aria-hidden="true"></div>
  <section class="prompt-block">
    <div class="word-row">
      <span class="audio-button">{{tts en_US:English}}</span>
      <div class="prompt prompt--english">{{English}}</div>
    </div>

    <div class="rule"></div>

    <div class="metadata">
      {{#Pronunciation}}<span class="pronunciation">{{Pronunciation}}</span>{{/Pronunciation}}
      {{#PartOfSpeech}}<span class="metadata-divider"></span><span class="part-of-speech">{{PartOfSpeech}}</span>{{/PartOfSpeech}}
    </div>
  </section>
  <div class="corner corner--bottom" aria-hidden="true"></div>
  <div class="corner-dots corner-dots--bottom" aria-hidden="true"></div>
</main>
