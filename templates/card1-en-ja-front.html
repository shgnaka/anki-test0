<main class="study-card study-card--front">
  <div class="corner corner--top" aria-hidden="true"></div>
  <div class="corner-dots corner-dots--top" aria-hidden="true"></div>
  <section class="prompt-block">
    <div class="word-row word-row--vocabulary">
      <span class="audio-button">{{tts en_US:英単語}}</span>
      <div class="prompt prompt--english fit-one-line">{{英単語}}</div>
    </div>

    <div class="rule"></div>

    {{#品詞}}
    <div class="metadata metadata--single">
      <span class="part-of-speech">{{品詞}}</span>
    </div>
    {{/品詞}}
  </section>
  <div class="corner corner--bottom" aria-hidden="true"></div>
  <div class="corner-dots corner-dots--bottom" aria-hidden="true"></div>
</main>

<script>
  (function () {
    function fitVocabulary() {
      var word = document.querySelector(".fit-one-line");
      if (!word) return;

      var row = word.parentElement;
      var audio = row.querySelector(".audio-button");
      var rowStyle = window.getComputedStyle(row);
      var gap = parseFloat(rowStyle.columnGap || rowStyle.gap) || 0;
      var available = row.clientWidth - (audio ? audio.offsetWidth + gap : 0);

      word.style.width = Math.max(available, 0) + "px";
      word.style.fontSize = "";

      var size = parseFloat(window.getComputedStyle(word).fontSize);
      while (word.scrollWidth > word.clientWidth && size > 18) {
        size -= 1;
        word.style.fontSize = size + "px";
      }
    }

    requestAnimationFrame(fitVocabulary);
    setTimeout(fitVocabulary, 100);
    window.addEventListener("resize", fitVocabulary);
  })();
</script>
